<body>
  <main class="auth-page">
    <section class="panel-block auth-card">
      <div class="block-heading">
        <h1>Uuendan kaarti</h1>
        <span>v166</span>
      </div>
      <p class="account-message">Puhastan vana brauseri vahemälu ja avan uue kaardi.</p>
    </section>
  </main>

  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
      } catch {
        // The reset page is best-effort; opening the fresh URL is still useful.
      }

      window.location.replace('index.html?fresh=166');
    })();
  </script>
</body>
</html>

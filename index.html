<!doctype html>
<html lang="et">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f5e62">
  <meta name="application-name" content="BussRadar">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="BussRadar">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; worker-src 'self'; manifest-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; connect-src 'self' https://transport.tallinn.ee https://api.open-meteo.com https://r.jina.ai https://api.allorigins.win; img-src 'self' data: https://unpkg.com https://tile.openstreetmap.org https://*.basemaps.cartocdn.com;">
  <title>BussRadar Tallinn</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://tile.openstreetmap.org">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="assets/css/styles.css?v=180">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="BussRadar Tallinn avaleht">
        <span class="brand-mark"><i data-lucide="bus-front"></i></span>
        <span>
          <strong>BussRadar</strong>
          <small>Tallinn</small>
        </span>
      </a>

      <button class="schedule-open-button" id="scheduleToggle" type="button" aria-expanded="false" aria-controls="schedulePanel">
        <i data-lucide="calendar-days"></i>
        <span>Sõiduplaanid</span>
      </button>

      <div class="topbar-actions">
        <button class="mode-toggle-button" id="transportModeToggle" type="button" aria-pressed="false" title="Lülita trammid sisse" aria-label="Lülita trammid sisse">
          <i data-lucide="tram-front"></i>
          <span id="transportModeText">Trammid</span>
        </button>
        <span class="status-pill" id="connectionStatus">Andmed ootavad</span>
        <button class="icon-button" id="helpButton" type="button" title="Kasutusõpetus" aria-label="Kasutusõpetus">
          <i data-lucide="circle-help"></i>
        </button>
        <button class="icon-button" id="themeToggle" type="button" title="Tume režiim" aria-label="Tume režiim">
          <i data-lucide="moon"></i>
        </button>
        <a class="install-button account-button" id="accountLink" href="login.html" title="Logi sisse" aria-label="Logi sisse">
          <i data-lucide="log-in"></i>
          <span id="authButtonText">Logi sisse</span>
        </a>
        <button class="icon-button" id="locateButton" type="button" title="Minu asukoht" aria-label="Minu asukoht">
          <i data-lucide="crosshair"></i>
        </button>
        <button class="icon-button" id="refreshButton" type="button" title="Värskenda" aria-label="Värskenda">
          <i data-lucide="refresh-cw"></i>
        </button>
        <button class="install-button" id="installButton" type="button" hidden>
          <i data-lucide="download"></i>
          <span>Paigalda</span>
        </button>
      </div>
    </header>

    <aside class="schedule-panel" id="schedulePanel" aria-hidden="true" aria-label="Sõiduplaanid">
      <div class="schedule-panel-card">
        <button class="schedule-panel-drag" id="schedulePanelDrag" type="button" aria-label="Muuda sõiduplaani kõrgust" aria-pressed="false" title="Lohista sõiduplaani kõrgust">
          <span aria-hidden="true"></span>
        </button>
        <div class="schedule-panel-head">
          <div>
            <strong>Sõiduplaanid</strong>
            <span id="scheduleSummary">-</span>
          </div>
          <button class="icon-button small" id="scheduleClose" type="button" title="Sulge sõiduplaan" aria-label="Sulge sõiduplaan">
            <i data-lucide="x"></i>
          </button>
        </div>

        <form class="schedule-form" id="scheduleForm">
          <div class="schedule-picker-grid">
            <label class="schedule-picker-field" for="scheduleLineSelect">
              <span id="scheduleLineLabel">Bussiliin</span>
              <select id="scheduleLineSelect" name="scheduleLine" aria-label="Vali bussiliini sõiduplaan">
                <option value="">Laen liine...</option>
              </select>
            </label>
            <label class="schedule-picker-field" for="scheduleDirectionSelect">
              <span>Suund</span>
              <select id="scheduleDirectionSelect" name="scheduleDirection" aria-label="Vali sõiduplaani suund">
                <option value="">Suund puudub</option>
              </select>
            </label>
            <button class="tool-button" type="submit">
              <i data-lucide="search"></i>
              <span>Näita</span>
            </button>
          </div>
        </form>

        <div class="schedule-list" id="scheduleList"></div>
      </div>
    </aside>

    <main class="workspace">
      <aside class="side-panel" aria-label="Juhtpaneel">
        <button class="panel-collapse-toggle" id="panelCollapseToggle" type="button" aria-expanded="true" aria-pressed="false" aria-label="Peida paneel" title="Lohista paneeli kõrgust">
          <span aria-hidden="true"></span>
        </button>
        <section class="panel-block">
          <div class="block-heading">
            <h1 id="vehiclePanelTitle">Valitud bussid</h1>
            <span id="vehicleCount">0 kaardil</span>
          </div>

          <form class="line-form" id="lineForm">
            <label class="field-label" id="lineLabel" for="lineInput">Bussiliin</label>
            <div class="inline-field">
              <input id="lineInput" name="line" type="text" autocomplete="off" inputmode="text" placeholder="nt 18">
              <button class="tool-button" type="submit">
                <i data-lucide="plus"></i>
                <span>Lisa</span>
              </button>
            </div>
          </form>

          <button class="tram-map-toggle" id="tramBusOverlayToggle" type="button" hidden aria-pressed="true">
            <span>
              <i data-lucide="bus-front"></i>
              <span id="tramBusOverlayText">Bussid kaardil</span>
            </span>
            <strong id="tramBusOverlayState">Sees</strong>
          </button>

          <div class="line-control-list" id="selectedLines" aria-label="Valitud liinid"></div>

          <div class="metric-grid">
            <div>
              <span>Uuendus</span>
              <strong id="lastUpdated">-</strong>
            </div>
            <div>
              <span>Järgmine</span>
              <strong id="nextRefresh">10 s</strong>
            </div>
          </div>
        </section>

        <section class="panel-block">
          <div class="block-heading">
            <h2>Peatuse tablo</h2>
            <span id="selectedStopName">Laikmaa</span>
          </div>

          <form class="stop-form" id="stopSearchForm">
            <label class="field-label" for="stopSearch">Peatus</label>
            <div class="inline-field">
              <input id="stopSearch" name="stop" type="search" autocomplete="off" placeholder="Viru, Balti jaam">
              <button class="icon-button contained" type="submit" title="Otsi peatust" aria-label="Otsi peatust">
                <i data-lucide="search"></i>
              </button>
            </div>
          </form>

          <div class="stop-results" id="stopResults"></div>
          <div class="departure-list" id="departures"></div>
        </section>

        <section class="panel-block">
          <div class="block-heading">
            <h2>Lemmikpeatused</h2>
            <span id="favoriteStopCount">0 valitud</span>
          </div>

          <form class="favorite-stop-form" id="favoriteStopForm">
            <label class="field-label" for="favoriteStopSearch">Peatus</label>
            <div class="inline-field">
              <input id="favoriteStopSearch" name="favoriteStop" type="search" autocomplete="off" placeholder="nt Laikmaa">
              <button class="icon-button contained" type="submit" title="Lisa lemmikpeatus" aria-label="Lisa lemmikpeatus">
                <i data-lucide="star"></i>
              </button>
            </div>
          </form>

          <div class="stop-results" id="favoriteStopResults"></div>
          <div class="favorite-stop-list" id="favoriteStopList"></div>
        </section>

        <section class="panel-block compact-block">
          <div class="block-heading">
            <h2>Ilm</h2>
            <span id="weatherUpdated">-</span>
          </div>
          <div class="weather-line">
            <strong id="weatherTemp">-</strong>
            <span id="weatherText">Laen ilma</span>
          </div>
          <div class="weather-detail" id="walkingAdvice">-</div>
        </section>

        <section class="panel-block compact-block">
          <div class="block-heading">
            <h2>Õpilaste voog</h2>
            <button class="icon-button small" id="toggleSchools" type="button" title="Koolide kiht" aria-label="Koolide kiht">
              <i data-lucide="graduation-cap"></i>
            </button>
          </div>
          <div class="crowd-list" id="schoolCrowds"></div>
        </section>

        <section class="panel-block compact-block">
          <div class="block-heading">
            <h2>Hilinemised</h2>
            <span id="delaySummary">-</span>
          </div>
          <div class="delay-list" id="delayList"></div>
        </section>
      </aside>

      <section class="map-area" aria-label="Tallinna ühistranspordikaart">
        <div id="map"></div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="assets/js/static-api.js?v=180"></script>
  <script src="assets/js/app.js?v=180" defer></script>
</body>
</html>
